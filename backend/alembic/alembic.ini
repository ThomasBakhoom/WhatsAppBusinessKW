[alembic]
# %(here)s resolves to the directory of this ini file, so this works
# regardless of which directory `alembic -c` is invoked from.
script_location = %(here)s
sqlalchemy.url = postgresql+asyncpg://kwgrowth:kwgrowth_dev@localhost:5432/kwgrowth

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
