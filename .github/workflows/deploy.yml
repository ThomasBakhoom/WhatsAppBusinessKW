name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: me-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.me-south-1.amazonaws.com
  ECS_CLUSTER: kwgrowth-production

permissions:
  id-token: write
  contents: read

jobs:
  # ── Build & Push Docker Images ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, frontend]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/kwgrowth/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'api' && 'backend' || 'frontend' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/kwgrowth/${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/kwgrowth/${{ matrix.service }}:cache,mode=max

  # ── Database Migration ──────────────────────────────────────────────
  migrate:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Register a fresh migration task revision pinned to the image we
      # just built (github.sha tag), then run it. Without this step, the
      # migration container would pull an older :latest and potentially
      # apply the wrong migration set ahead of the new service rollout.
      - name: Register migration task pinned to new image
        id: register
        run: |
          set -euo pipefail
          IMAGE="${{ env.ECR_REGISTRY }}/kwgrowth/api:${{ github.sha }}"
          TD=$(aws ecs describe-task-definition --task-definition kwgrowth-migrate --query taskDefinition)
          NEW=$(echo "$TD" | jq --arg IMG "$IMAGE" '
            .containerDefinitions |= map(.image = $IMG)
            | {family, taskRoleArn, executionRoleArn, networkMode, containerDefinitions,
               volumes, placementConstraints, requiresCompatibilities, cpu, memory}')
          ARN=$(aws ecs register-task-definition --cli-input-json "$NEW" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Run Alembic migrations
        run: |
          set -euo pipefail
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --task-definition "${{ steps.register.outputs.task_def_arn }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_IDS }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP_ID }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"migrate","command":["alembic","-c","alembic/alembic.ini","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster "${{ env.ECS_CLUSTER }}" --tasks "$TASK_ARN"
          CODE=$(aws ecs describe-tasks --cluster "${{ env.ECS_CLUSTER }}" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$CODE" != "0" ]; then
            REASON=$(aws ecs describe-tasks --cluster "${{ env.ECS_CLUSTER }}" --tasks "$TASK_ARN" \
              --query 'tasks[0].stoppedReason' --output text)
            echo "::error::Migration task failed: exit=$CODE reason=$REASON"
            exit 1
          fi

  # ── Deploy to ECS ───────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build, migrate]
    strategy:
      matrix:
        service: [api, frontend, celery-worker, celery-beat]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service kwgrowth-${{ matrix.service }} \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services kwgrowth-${{ matrix.service }}

  # ── Smoke Test ──────────────────────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.kwgrowth.com/health/ready)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: API smoke test
        run: |
          curl -sf https://app.kwgrowth.com/v1/payments/plans || exit 1
          echo "API smoke test passed"
